<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语脉 · 濒危语言保护系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0e0b;
    --surface:  #1c1a14;
    --surface2: #252218;
    --border:   #3a3320;
    --amber:    #c9882a;
    --amber2:   #e8b060;
    --cream:    #e2d5bc;
    --muted:    #8a7d64;
    --danger:   #9b4040;
    --teal:     #3a7a6a;
    --radius:   8px;
  }

  body {
    font-family: 'Noto Serif SC', 'EB Garamond', serif;
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    background: var(--surface);
  }
  .logo-mark {
    width: 42px; height: 42px;
    border: 1.5px solid var(--amber);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--amber);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .logo-text h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--amber2);
    letter-spacing: 3px;
  }
  .logo-text p {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 2rem;
  }
  .stat { text-align: center; }
  .stat-num { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--amber2); }
  .stat-lbl { font-size: 0.68rem; color: var(--muted); letter-spacing: 1px; }

  /* ─── Layout ─── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    flex: 1;
    min-height: 0;
    height: calc(100vh - 72px);
  }

  /* ─── Main Panel ─── */
  .main-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  /* ─── Agent Tabs ─── */
  .agent-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .agent-tab {
    padding: 1rem 1.5rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-size: 0.88rem;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Noto Serif SC', serif;
  }
  .agent-tab:hover { color: var(--cream); }
  .agent-tab.active {
    color: var(--amber2);
    border-bottom-color: var(--amber);
  }
  .tab-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  .agent-tab.active .tab-dot { background: var(--amber); }

  /* ─── Chat area ─── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .agent-intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .agent-intro h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--amber);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
  }
  .agent-intro p {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.7;
  }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    color: var(--amber);
    background: var(--surface2);
  }
  .msg.user .msg-avatar { color: var(--muted); }

  .msg-bubble {
    max-width: 70%;
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    font-size: 0.9rem;
    line-height: 1.75;
    border: 1px solid var(--border);
  }
  .msg.assistant .msg-bubble {
    background: var(--surface);
    color: var(--cream);
  }
  .msg.user .msg-bubble {
    background: var(--surface2);
    color: var(--cream);
  }
  .msg.system .msg-bubble {
    background: transparent;
    border-color: var(--teal);
    color: var(--muted);
    font-size: 0.8rem;
    font-style: italic;
    max-width: 100%;
  }

  /* ─── Thinking ─── */
  .thinking {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .thinking-dots {
    display: flex;
    gap: 5px;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--amber);
    border-radius: 50%;
    animation: pulse 1.4s infinite;
    opacity: 0.4;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ─── Input area ─── */
  .input-area {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--cream);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.9rem;
    padding: 0.7rem 1rem;
    resize: none;
    min-height: 50px;
    max-height: 150px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--amber); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--amber);
    border: none;
    border-radius: var(--radius);
    color: #0f0e0b;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0 1.2rem;
    height: 42px;
    cursor: pointer;
    font-family: 'Noto Serif SC', serif;
    letter-spacing: 1px;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .send-btn:hover { background: var(--amber2); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; color: var(--muted); }

  .quick-prompts {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 4px 12px;
    cursor: pointer;
    font-family: 'Noto Serif SC', serif;
    transition: all 0.2s;
  }
  .quick-btn:hover { border-color: var(--amber); color: var(--amber2); }

  /* ─── Sidebar ─── */
  .sidebar {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }
  .sidebar-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-title {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    color: var(--amber);
    letter-spacing: 2px;
  }
  .sidebar-content {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .knowledge-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    animation: fadeUp 0.3s ease;
  }
  .kc-tag {
    font-size: 0.68rem;
    color: var(--amber);
    letter-spacing: 1px;
    margin-bottom: 4px;
    font-family: 'Cinzel', serif;
  }
  .kc-content { color: var(--cream); line-height: 1.65; }
  .kc-source { color: var(--muted); font-size: 0.72rem; margin-top: 4px; font-style: italic; }

  /* ─── API Key Modal ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--amber);
    border-radius: var(--radius);
    padding: 2rem;
    width: 420px;
    max-width: 90vw;
  }
  .modal h2 {
    font-family: 'Cinzel', serif;
    color: var(--amber2);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    font-size: 1rem;
  }
  .modal p { color: var(--muted); font-size: 0.85rem; line-height: 1.7; margin-bottom: 1.25rem; }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--cream);
    font-size: 0.88rem;
    padding: 0.7rem 1rem;
    outline: none;
    font-family: monospace;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .modal input:focus { border-color: var(--amber); }
  .modal-btn {
    width: 100%;
    background: var(--amber);
    border: none;
    border-radius: var(--radius);
    color: #0f0e0b;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.75rem;
    cursor: pointer;
    font-family: 'Noto Serif SC', serif;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .modal-btn:hover { background: var(--amber2); }

  /* ─── Export btn ─── */
  .export-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 0.72rem;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Noto Serif SC', serif;
    transition: all 0.2s;
  }
  .export-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ─── Empty state ─── */
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.8;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty-icon { font-size: 1.5rem; margin-bottom: 0.5rem; opacity: 0.5; }

  /* ─── Wave animation (Collection agent) ─── */
  .wave-bar {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 20px;
  }
  .wave-bar span {
    display: inline-block;
    width: 3px;
    background: var(--amber);
    border-radius: 2px;
    opacity: 0.7;
    animation: wave 1.2s ease-in-out infinite;
  }
  .wave-bar span:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar span:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar span:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar span:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 18px; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── Agent configs ────────────────────────────────────────────────
const AGENTS = {
  collect: {
    id: 'collect',
    label: '采集 · 声音',
    intro: {
      title: 'COLLECTION AGENT',
      desc: '以自然闲聊引导母语者说话，智能提取词汇与语法结构。避免朗读式采集，最大化有效语料密度。'
    },
    system: `你是一个专业的濒危语言采集 Agent，负责引导老年母语者用最自然的方式讲述语言。

你的核心目标：
1. 用温暖、耐心的语气，像朋友聊天一样引导对话
2. 从对话中实时提取词汇、短语、语法结构
3. 每次回应后，在【语料提取】模块里整理你发现的语言材料

格式要求：

- 然后输出一个【语料提取】区块，格式如下：

【语料提取】

请始终保持温暖、尊重的态度。记住，这些声音可能是世界上最后的记录。`,
    quickPrompts: [
      '您平时怎么称呼早饭？',
      '小时候父母怎么叫您起床？',
      '村里人以前怎么问候彼此？',
      '您能唱一段老歌谣吗？',
    ]
  },
  reason: {
    id: 'reason',
    label: '推理 · 语法',
    intro: {
      title: 'REASONING AGENT',
      desc: '对碎片语料进行长链推理，自动归纳语法规律，生成假设并设计验证问题，逐步重建语言体系。'
    },
    system: `你是一个语言学推理 Agent，专门分析濒危语言的碎片化语料，重建语法体系。

你的工作流程：
1. 接收用户输入的语料碎片（词汇、句子、发音描述等）

3. 生成语法假设，并设计验证问题

输出格式：
**📊 语料分析**
[分析输入材料的特征]

**🔍 推理过程**
步骤1：...
步骤2：...
步骤3：...

**💡 语法假设**

**❓ 验证问题**

**📝 知识图谱更新**
[建议添加到知识库的条目]

请进行严格的学术推理，同时保持对语言多样性的敬畏。`,
    quickPrompts: [
      '粘贴采集到的语料片段',
      '分析声调规律',
      '推断词序类型（SOV/SVO）',
      '归纳量词使用规律',
    ]
  },
  transmit: {
    id: 'transmit',
    label: '传承 · 学习',
    intro: {
      title: 'INHERITANCE AGENT',
      desc: '将语料库转化为年轻人可以学习的互动内容，生成记忆卡片、故事、对话练习，让语言在新一代中延续。'
    },
    system: `你是一个语言传承 Agent，负责将濒危语言的语料转化为现代年轻人喜欢的学习材料。

根据用户的请求，你可以生成：
1. **记忆卡片**：词汇 + 例句 + 记忆口诀
2. **情景对话**：日常场景的完整对话练习
3. **文化故事**：将语言知识编入有趣的故事
4. **发音指南**：用现代方式解释特殊音韵

格式要求：
- 内容要生动、有文化温度

    quickPrompts: [
      '生成10张记忆单词卡',
      '写一个用方言对话的故事',

      '创作一首教学童谣',
    ]

// ── API call ─────────────────────────────────────────────────────
async function callClaude(apiKey, systemPrompt, messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      system: systemPrompt,
      messages: messages.map(m => ({ role: m.role, content: m.content }))
    })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || '请求失败');
  }
  const data = await res.json();
  return data.content[0].text;
}

// ── Extract knowledge ─────────────────────────────────────────────
function extractKnowledge(text, agentId) {
  const items = [];
  if (agentId === 'collect') {
    const match = text.match(/【语料提取】([\s\S]*?)(?=\n\n|$)/);
    if (match) {
      const lines = match[1].trim().split('\n').filter(l => l.startsWith('-'));
      lines.forEach(l => {
        const content = l.replace(/^-\s*/, '').trim();
        if (content) items.push({ tag: '语料', content, source: '采集Agent' });
      });
    }
  } else if (agentId === 'reason') {
    const hypoMatch = text.match(/\*\*💡 语法假设\*\*([\s\S]*?)(?=\*\*❓|\*\*📝|$)/);
    if (hypoMatch) {
      const lines = hypoMatch[1].trim().split('\n').filter(l => l.match(/^-/));
      lines.slice(0,2).forEach(l => {
        const content = l.replace(/^-\s*(假设\d+：)?/, '').trim();
        if (content) items.push({ tag: '假设', content, source: '推理Agent' });
      });
    }
    const kgMatch = text.match(/\*\*📝 知识图谱更新\*\*([\s\S]*?)(?=\n\n\*\*|$)/);
    if (kgMatch) {
      items.push({ tag: '知识点', content: kgMatch[1].trim().substring(0, 120), source: '推理Agent' });
    }
  } else if (agentId === 'transmit') {
    const sumMatch = text.match(/【知识点总结】([\s\S]*?)(?=\n\n|$)/);
    if (sumMatch) {
      items.push({ tag: '传承材料', content: sumMatch[1].trim().substring(0, 120), source: '传承Agent' });
    } else {
      // Extract first meaningful paragraph
      const lines = text.split('\n').filter(l => l.trim() && !l.startsWith('#') && !l.startsWith('**'));
      if (lines[0]) items.push({ tag: '传承材料', content: lines[0].substring(0, 100), source: '传承Agent' });
    }
  }
  return items;
}

// ── Main App ─────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState('');
  const [apiKeyInput, setApiKeyInput] = useState('');
  const [showModal, setShowModal] = useState(true);
  const [activeTab, setActiveTab] = useState('collect');
  const [chats, setChats] = useState({ collect: [], reason: [], transmit: [] });
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [knowledge, setKnowledge] = useState([]);
  const [counts, setCounts] = useState({ words: 0, patterns: 0, materials: 0 });
  const chatEndRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [chats, loading]);

  const handleKeyConfirm = () => {
    if (apiKeyInput.trim().startsWith('sk-')) {
      setApiKey(apiKeyInput.trim());
      setShowModal(false);
    } else {
      alert('请输入有效的 Anthropic API Key（以 sk- 开头）');
    }
  };

  const handleSend = useCallback(async (text) => {
    const msg = (text || input).trim();
    if (!msg || loading) return;
    setInput('');

    const agent = AGENTS[activeTab];
    const userMsg = { role: 'user', content: msg };

    setChats(prev => ({
      ...prev,
      [activeTab]: [...prev[activeTab], userMsg]
    }));
    setLoading(true);

    try {
      const history = [...chats[activeTab], userMsg];
      const reply = await callClaude(apiKey, agent.system, history);

      const assistantMsg = { role: 'assistant', content: reply };
      setChats(prev => ({
        ...prev,
        [activeTab]: [...prev[activeTab], userMsg, assistantMsg]
      }));

      // Extract knowledge
      const items = extractKnowledge(reply, activeTab);
      if (items.length > 0) {
        setKnowledge(prev => [...items, ...prev].slice(0, 50));
        setCounts(prev => ({
          words: activeTab === 'collect' ? prev.words + items.length : prev.words,
          patterns: activeTab === 'reason' ? prev.patterns + items.length : prev.patterns,
          materials: activeTab === 'transmit' ? prev.materials + 1 : prev.materials,
        }));
      }
    } catch (e) {
      setChats(prev => ({
        ...prev,
        [activeTab]: [...prev[activeTab], userMsg, {
          role: 'assistant',
          content: `⚠️ 请求失败：${e.message}`
        }]
      }));
    }
    setLoading(false);
  }, [input, loading, activeTab, chats, apiKey]);

  const handleExport = () => {
    const data = { timestamp: new Date().toISOString(), knowledge, chats };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `语脉_语料库_${new Date().toLocaleDateString('zh')}.json`;
    a.click();
  };

  const agent = AGENTS[activeTab];
  const currentChat = chats[activeTab];

  return (
    <>
      {showModal && (
        <div className="modal-overlay">
          <div className="modal">
            <h2>语脉 · 启动系统</h2>
            <p>
              这套系统将帮助你记录正在消失的声音。<br/>
              请输入你的 Anthropic API Key 以启动三层 Agent。
            </p>
            <input
              type="password"
              placeholder="sk-ant-..."
              value={apiKeyInput}
              onChange={e => setApiKeyInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleKeyConfirm()}
              autoFocus
            />
            <button className="modal-btn" onClick={handleKeyConfirm}>
              启动系统 →
            </button>
          </div>
        </div>
      )}

      <header>
        <div className="logo-mark">语脉</div>
        <div className="logo-text">
          <h1>YǓMÀI</h1>
          <p>濒危语言保护系统 · ENDANGERED LANGUAGE REVIVAL</p>
        </div>
        <div className="header-stats">
          <div className="stat">
            <div className="stat-num">{counts.words}</div>
            <div className="stat-lbl">词汇采集</div>
          </div>
          <div className="stat">
            <div className="stat-num">{counts.patterns}</div>
            <div className="stat-lbl">语法假设</div>
          </div>
          <div className="stat">
            <div className="stat-num">{counts.materials}</div>
            <div className="stat-lbl">传承材料</div>
          </div>
        </div>
      </header>

      <div className="layout">
        <div className="main-panel">
          <div className="agent-tabs">
            {Object.values(AGENTS).map(a => (
              <button
                key={a.id}
                className={`agent-tab ${activeTab === a.id ? 'active' : ''}`}
                onClick={() => setActiveTab(a.id)}
              >
                <span className="tab-dot" />
                {a.label}
              </button>
            ))}
          </div>

          <div className="chat-area">
            <div className="agent-intro">
              <h3>{agent.intro.title}</h3>
              <p>{agent.intro.desc}</p>
            </div>

            {currentChat.map((msg, i) => (
              <div key={i} className={`msg ${msg.role}`}>
                <div className="msg-avatar">
                  {msg.role === 'user' ? '人' : msg.role === 'assistant' ? (
                    activeTab === 'collect' ? '声' : activeTab === 'reason' ? '析' : '承'
                  ) : '系'}
                </div>
                <div className="msg-bubble" style={{ whiteSpace: 'pre-wrap' }}>
                  {msg.content}
                </div>
              </div>
            ))}

            {loading && (
              <div className="thinking">
                <div className="msg-avatar">
                  {activeTab === 'collect' ? '声' : activeTab === 'reason' ? '析' : '承'}
                </div>
                <div className="thinking-dots">
                  <div className="dot" /><div className="dot" /><div className="dot" />
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          <div className="input-area">
            <div className="quick-prompts">
              {agent.quickPrompts.map((p, i) => (
                <button key={i} className="quick-btn" onClick={() => handleSend(p)}>
                  {p}
                </button>
              ))}
            </div>
            <div className="input-row">
              <textarea
                placeholder={
                  activeTab === 'collect' ? '输入引导问题，或描述老人说的内容…' :
                  activeTab === 'reason' ? '粘贴语料碎片，请求分析…' :
                  '描述你想创建的学习材料…'
                }
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                  }
                }}
                rows={2}
              />
              <button className="send-btn" onClick={() => handleSend()} disabled={loading || !input.trim()}>
                发送
              </button>
            </div>
          </div>
        </div>

        <div className="sidebar">
          <div className="sidebar-header">
            <span className="sidebar-title">知识库</span>
            <button className="export-btn" onClick={handleExport}>导出 JSON</button>
          </div>
          <div className="sidebar-content">
            {knowledge.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">◎</div>
                <div>语料库尚未建立<br/>开始与采集 Agent 对话<br/>发现的词汇将在此积累</div>
              </div>
            ) : (
              knowledge.map((item, i) => (
                <div key={i} className="knowledge-card">
                  <div className="kc-tag">{item.tag}</div>
                  <div className="kc-content">{item.content}</div>
                  <div className="kc-source">— {item.source}</div>
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
